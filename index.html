<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأفلام العالمية - مشاهدة مباشرة</title>
    
    <meta name="monetag" content="b487dbfe90a7c247a30d14007ab317de">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #e11d48;
            --accent-color: #f59e0b;
            --shadow: rgba(0, 0, 0, 0.3);
            --dev-neon: #06b6d4;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --primary-color: #be123c;
            --accent-color: #d97706;
            --shadow: rgba(0, 0, 0, 0.1);
            --dev-neon: #0891b2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 50px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: var(--card-bg);
            box-shadow: 0 4px 6px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-toggle {
            background: none;
            border: 2px solid var(--text-muted);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            font-size: 14px;
        }

        .dev-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(6, 182, 212, 0.15);
            color: var(--dev-neon);
            border: 2px solid var(--dev-neon);
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
            animation: pulse-neon 2s infinite alternate ease-in-out;
        }

        @keyframes pulse-neon {
            0% {
                transform: scale(1);
                box-shadow: 0 0 8px rgba(6, 182, 212, 0.3);
            }
            100% {
                transform: scale(1.04);
                box-shadow: 0 0 18px rgba(6, 182, 212, 0.6);
            }
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .genres-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: thin;
        }

        .genre-tab {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid transparent;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 2px 4px var(--shadow);
        }

        .genre-tab.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(225, 29, 72, 0.4);
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 30px;
            border-right: 5px solid var(--primary-color);
            padding-right: 15px;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px var(--shadow);
            cursor: pointer;
            position: relative;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px var(--shadow);
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .movie-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay i {
            color: #fff;
            font-size: 50px;
            text-shadow: 0 0 15px var(--primary-color);
        }

        .movie-poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .rating {
            background-color: rgba(245, 158, 11, 0.15);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .player-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .player-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            width: 95%;
            max-width: 900px;
            position: relative;
        }

        .modal-header-buttons {
            position: absolute;
            top: -45px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            background: var(--primary-color);
            padding: 6px 18px;
            border-radius: 4px;
            border: none;
            font-family: 'Cairo', sans-serif;
        }

        .help-link {
            color: var(--accent-color);
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            background: rgba(245, 158, 11, 0.1);
            padding: 6px 14px;
            border-radius: 4px;
            border: 1px dashed var(--accent-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .help-link:hover {
            background: rgba(245, 158, 11, 0.2);
        }

        .server-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .server-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }

        .server-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(225, 29, 72, 0.3);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 8px;
        }

        .loader {
            text-align: center;
            font-size: 20px;
            grid-column: 1 / -1;
            padding: 50px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-film"></i>
            <span>سينما للمشاهدة المباشرة - أفلام مترجمة</span>
        </div>
        <div class="nav-controls">
            <a href="https://wa.me/201067579526" target="_blank" class="dev-link">
                <i class="fab fa-whatsapp"></i> المطور: Ahmed Wael Saad
            </a>
            <button class="theme-toggle" id="themeBtn">تغيير المظهر</button>
        </div>
    </header>

    <div class="container">
        <div class="genres-nav" id="genresNav">
            <button class="genre-tab active" onclick="changeGenre('trending', this)">🔥 الأكثر شعبية</button>
            <button class="genre-tab" onclick="changeGenre('oldies', this)">🎬 كلاسيكيات (قبل 2020)</button>
            <button class="genre-tab" onclick="changeGenre('28', this)">🎬 أكشن</button>
            <button class="genre-tab" onclick="changeGenre('35', this)">😂 كوميدي</button>
            <button class="genre-tab" onclick="changeGenre('10749', this)">❤️ رومانسي</button>
            <button class="genre-tab" onclick="changeGenre('27', this)">👻 رعب</button>
            <button class="genre-tab" onclick="changeGenre('878', this)">🚀 خيال علمي</button>
            <button class="genre-tab" onclick="changeGenre('53', this)">🥶 إثارة وتشويق</button>
        </div>

        <h2 class="section-title" id="sectionTitle">الأفلام الأكثر شعبية الآن</h2>
        <div class="movies-grid" id="moviesContainer">
            <div class="loader"><i class="fas fa-spinner fa-spin"></i> جاري جلب قائمة الأفلام المحدثة...</div>
        </div>
    </div>

    <div class="player-modal" id="playerModal">
        <div class="modal-content">
            <div class="modal-header-buttons">
                <button class="close-btn" id="closeBtn"><i class="fas fa-times"></i> إغلاق المشغل</button>
                <a href="#" class="help-link" id="helpLink"><i class="fas fa-closed-captioning"></i> حل مشكلة التقديم وعدم تطابق الترجمة؟</a>
            </div>
            <div class="server-selector" id="serverSelector"></div>
            <div class="video-container">
                <iframe id="videoPlayer" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>
    </div>

    <script>
        const themeBtn = document.getElementById('themeBtn');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);

        themeBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        const API_KEY = 'f2db658c571ee42faf598b1113f96777'; 
        const moviesContainer = document.getElementById('moviesContainer');
        const playerModal = document.getElementById('playerModal');
        const videoPlayer = document.getElementById('videoPlayer');
        const closeBtn = document.getElementById('closeBtn');
        const helpLink = document.getElementById('helpLink');
        const serverSelector = document.getElementById('serverSelector');
        const sectionTitle = document.getElementById('sectionTitle');

        let currentMovieId = '';
        let currentGenre = 'trending';

        async function fetchMovies(genreId = 'trending') {
            moviesContainer.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-spin"></i> جاري معالجة وجلب مكتبة الأفلام الضخمة...</div>';
            let allMovies = [];
            
            try {
                let maxPages = genreId === 'oldies' ? 26 : 6; 

                for (let page = 1; page <= maxPages; page++) {
                    let url = '';
                    if (genreId === 'trending') {
                        url = `https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&language=ar-SA&page=${page}`;
                    } else if (genreId === 'oldies') {
                        url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&primary_release_date.lte=2019-12-31&language=ar-SA&page=${page}`;
                    } else {
                        url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&sort_by=popularity.desc&language=ar-SA&page=${page}`;
                    }
                    
                    const response = await fetch(url);
                    const data = await response.json();
                    if (data.results) {
                        allMovies = allMovies.concat(data.results);
                    }
                }
                displayMovies(allMovies);
            } catch (error) {
                moviesContainer.innerHTML = '<div class="loader">حدث خطأ في جلب البيانات من السيرفر.</div>';
            }
        }

        function displayMovies(movies) {
            moviesContainer.innerHTML = ''; 
            if(movies.length === 0) {
                moviesContainer.innerHTML = '<div class="loader">لا توجد أفلام متاحة في هذا القسم حالياً.</div>';
                return;
            }

            movies.forEach(movie => {
                const posterPath = movie.poster_path 
                    ? `https://images.weserv.nl/?url=image.tmdb.org/t/p/w500${movie.poster_path}` 
                    : 'https://via.placeholder.com/500x750?text=No+Poster';
                
                const releaseYear = movie.release_date ? movie.release_date.split('-')[0] : 'غير معروف';
                const rating = movie.vote_average ? movie.vote_average.toFixed(1) : '0.0';

                const movieCard = document.createElement('div');
                movieCard.className = 'movie-card';
                
                movieCard.addEventListener('click', () => {
                    currentMovieId = movie.id;
                    openPlayer();
                });

                movieCard.innerHTML = `
                    <div class="play-overlay"><i class="fas fa-play-circle"></i></div>
                    <img src="${posterPath}" alt="${movie.title}" class="movie-poster">
                    <div class="movie-info">
                        <h3 class="movie-title">${movie.title}</h3>
                        <div class="movie-meta">
                            <span><i class="far fa-calendar-alt"></i> ${releaseYear}</span>
                            <span class="rating"><i class="fas fa-star"></i> ${rating}</span>
                        </div>
                    </div>
                `;
                moviesContainer.appendChild(movieCard);
            });
        }

        function changeGenre(genreId, buttonElement) {
            document.querySelectorAll('.genre-tab').forEach(tab => tab.classList.remove('active'));
            buttonElement.classList.add('active');
            
            sectionTitle.innerText = buttonElement.innerText;
            
            currentGenre = genreId;
            fetchMovies(genreId);
        }

        function openPlayer() {
            const servers = [
                { 
                    name: "سيرفر الترجمة الذكية الافتراضي (VidSrc CC)", 
                    url: `https://vidsrc.cc/v2/embed/movie/${currentMovieId}?autoSub=ar` 
                },
                { 
                    name: "سيرفر الترجمة الفورية الثابتة (SuperEmbed)", 
                    url: `https://multiembed.mov/?video_id=${currentMovieId}&type=movie` 
                },
                { 
                    name: "سيرفر جودة مستقرة (EmbedSu)", 
                    url: `https://embed.su/embed/movie/${currentMovieId}?sub.ar=1` 
                },
                { 
                    name: "سيرفر سينمائي سريع (VidSrc VIP)", 
                    url: `https://vidsrc.me/embed/movie?tmdb=${currentMovieId}&sub=ar` 
                },
                { 
                    name: "سيرفر بث بديل (SmashyStream)", 
                    url: `https://player.smashystream.com/api/alpha?tmdb=1&id=${currentMovieId}&sub=ar` 
                }
            ];

            serverSelector.innerHTML = '';
            servers.forEach((server, index) => {
                const btn = document.createElement('button');
                btn.className = `server-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = server.name;
                btn.onclick = () => {
                    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    videoPlayer.src = server.url;
                };
                serverSelector.appendChild(btn);
            });

            videoPlayer.src = servers[0].url;
            playerModal.classList.add('active');
        }

        helpLink.addEventListener('click', (e) => {
            e.preventDefault();
            alert(
                "🎬 حل مشكلة عدم توافق أو اختفاء الترجمة عند تقديم الفيلم:\n\n" +
                "1️⃣ عند تقديم الفيلم بسرعة، قد يحدث تأخير لثوانٍ في استجابة الترجمة. انتظر 3 ثوانٍ وستعود للعمل تلقائياً بشكل متزامن.\n\n" +
                "2️⃣ إذا استمر التوقف، اضغط على زر التوقف المؤقت (Pause) ثم تشغيل (Play) لتجبر المشغل على إعادة مزامنة النص مع الصوت فوراً.\n\n" +
                "3️⃣ السيرفر الثاني (SuperEmbed) يعتبر الأقوى في تفادي هذه المشكلة، حيث يعيد توليد ملف الترجمة بدقة بالغة عند القفز لأي دقيقة في الفيلم.\n\n" +
                "4️⃣ تأكد دائماً من الضغط على علامة (CC) داخل مشغل الفيديو واختيار اللغة العربية (Arabic) يدوياً إذا لزم الأمر."
            );
        });

        closeBtn.addEventListener('click', () => {
            playerModal.classList.remove('active');
            videoPlayer.src = ''; 
        });

        fetchMovies('trending');
    </script>

    <script src="https://alwingulla.com/act/files/tag.min.js?z=8842144" data-cfasync="false" async></script>

</body>
</html>
